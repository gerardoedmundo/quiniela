<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Quiniela Liga MX</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#071326,#0d2340,#133b68);
    min-height:100vh;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    font-size:2.3rem;
    margin-bottom:10px;
}

.title p{
    opacity:0.8;
}

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:22px;
    padding:20px;
    margin-bottom:25px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.match-title{
    text-align:center;
    font-size:1.4rem;
    font-weight:bold;
    margin-bottom:20px;
}

.teams{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:15px;
    flex-wrap:wrap;
}

.team{
    flex:1;
    min-width:120px;
    text-align:center;
}

.team-name{
    margin-bottom:10px;
    font-size:1.1rem;
    font-weight:bold;
}

select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-size:1rem;
    font-weight:bold;
    text-align:center;
    color:#0d2340;
}

.vs{
    font-size:1.6rem;
    font-weight:bold;
}

.extra{
    margin-top:10px;
}

.extra label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-size:1rem;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:15px;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn-save{
    background:#00c853;
    color:white;
}

.btn-save:hover{
    background:#00e676;
}

.btn-whatsapp{
    background:#25D366;
    color:white;
    display:none;
}

.btn-whatsapp:hover{
    background:#2df07a;
}

.resultado{
    display:none;
    margin-top:20px;
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:20px;
}

.resultado h2{
    text-align:center;
    margin-bottom:15px;
}

.resultado p{
    margin:10px 0;
}

@media(max-width:700px){

    .teams{
        flex-direction:column;
    }

    .vs{
        margin:10px 0;
    }

    .title h1{
        font-size:1.8rem;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>⚽ Quiniela Liga MX</h1>
        <p>Semifinales - Marcador Global</p>
    </div>

    <!-- PARTIDO 1 -->
    <div class="card">

        <div class="match-title">
            Pumas vs Pachuca
        </div>

        <div class="teams">

            <div class="team">
                <div class="team-name">Pumas</div>

                <select id="pumas">
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                </select>
            </div>

            <div class="vs">VS</div>

            <div class="team">
                <div class="team-name">Pachuca</div>

                <select id="pachuca">
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                </select>
            </div>

        </div>

    </div>

    <!-- PARTIDO 2 -->
    <div class="card">

        <div class="match-title">
            Guadalajara vs Cruz Azul
        </div>

        <div class="teams">

            <div class="team">
                <div class="team-name">Guadalajara</div>

                <select id="gdl">
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                </select>
            </div>

            <div class="vs">VS</div>

            <div class="team">
                <div class="team-name">Cruz Azul</div>

                <select id="cruzazul">
                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                </select>
            </div>

        </div>

    </div>

    <!-- NOMBRE -->
    <div class="card">

        <div class="extra">
            <label>Nombre del participante</label>
            <input type="text" id="nombre" placeholder="Escribe tu nombre">
        </div>

        <button class="btn-save" onclick="guardarQuiniela()">
            Guardar Quiniela
        </button>

        <button class="btn-whatsapp" id="btnWhatsapp" onclick="enviarWhatsApp()">
            Enviar por WhatsApp
        </button>

    </div>

    <!-- RESULTADO -->
    <div class="resultado" id="resultado">

        <h2>✅ Quiniela Guardada</h2>

        <p id="resNombre"></p>
        <p id="res1"></p>
        <p id="res2"></p>

    </div>

</div>

<script>

let mensajeWhatsApp = "";

function guardarQuiniela(){

    let nombre = document.getElementById("nombre").value;

    let pumas = document.getElementById("pumas").value;
    let pachuca = document.getElementById("pachuca").value;

    let gdl = document.getElementById("gdl").value;
    let cruzazul = document.getElementById("cruzazul").value;

    document.getElementById("resultado").style.display = "block";

    document.getElementById("resNombre").innerHTML =
    "👤 Participante: <b>" + nombre + "</b>";

    document.getElementById("res1").innerHTML =
    "⚽ Pumas " + pumas + " - " + pachuca + " Pachuca";

    document.getElementById("res2").innerHTML =
    "⚽ Guadalajara " + gdl + " - " + cruzazul + " Cruz Azul";

    mensajeWhatsApp =
`⚽ QUINIELA LIGA MX

👤 Participante: ${nombre}

🏆 Pumas ${pumas} - ${pachuca} Pachuca

🏆 Guadalajara ${gdl} - ${cruzazul} Cruz Azul`;

    document.getElementById("btnWhatsapp").style.display = "block";

}

function enviarWhatsApp(){

    let url = "https://wa.me/?text=" + encodeURIComponent(mensajeWhatsApp);

    window.open(url, "_blank");

}

</script>

</body>
</html>
