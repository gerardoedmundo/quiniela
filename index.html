<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quiniela de Fútbol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0d47a1, #1976d2);
      color: #333;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: white;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    input[type="text"], input[type="number"] {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    input[type="text"] {
      width: 100%;
      margin-bottom: 15px;
    }

    .match {
      background: #f5f8ff;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      border-left: 5px solid #1976d2;
    }

    .teams {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .score {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #1976d2;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0d47a1;
    }

    .result {
      margin-top: 20px;
      background: #eef4ff;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #c5d6ff;
    }
  </style>
</head>
<body>

<h1>Quiniela de Fútbol CBT2 (Marcadores)</h1>

<div class="container" id="app"></div>

<script>
const { jsPDF } = window.jspdf;

// 🔁 EQUIPOS INVERTIDOS
const partidos = [
  ["Pumas", "América"],
  ["Guadalajara", "Tigres"],
  ["Cruz Azul", "Atlas"],
  ["Pachuca", "Toluca"]
];

let datosGuardados = null;

const app = document.getElementById("app");

function render() {
  app.innerHTML = "";

  const inputNombre = document.createElement("input");
  inputNombre.type = "text";
  inputNombre.id = "nombre";
  inputNombre.placeholder = "Ingresa tu nombre";
  app.appendChild(inputNombre);

  partidos.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      <div class="teams">${p[0]} vs ${p[1]}</div>
      <div class="score">
        <input type="number" min="0" id="golA${i}" placeholder="${p[0]}" />
        <span> - </span>
        <input type="number" min="0" id="golB${i}" placeholder="${p[1]}" />
      </div>
    `;

    app.appendChild(div);
  });

  const btnEnviar = document.createElement("button");
  btnEnviar.textContent = "Guardar Quiniela";
  btnEnviar.onclick = enviar;
  app.appendChild(btnEnviar);

  const btnPDF = document.createElement("button");
  btnPDF.textContent = "Descargar PDF";
  btnPDF.onclick = descargarPDF;
  app.appendChild(btnPDF);

  const btnWhats = document.createElement("button");
  btnWhats.textContent = "Enviar por WhatsApp";
  btnWhats.onclick = enviarWhatsApp;
  app.appendChild(btnWhats);

  const resultado = document.createElement("div");
  resultado.id = "resultado";
  resultado.className = "result";
  app.appendChild(resultado);
}

function enviar() {
  const nombre = document.getElementById("nombre").value.trim();

  if (!nombre) {
    alert("Ingresa tu nombre");
    return;
  }

  let resultados = [];

  for (let i = 0; i < partidos.length; i++) {
    const golA = document.getElementById(`golA${i}`).value;
    const golB = document.getElementById(`golB${i}`).value;

    if (golA === "" || golB === "") {
      alert("Completa todos los marcadores");
      return;
    }

    resultados.push({ golA, golB });
  }

  datosGuardados = { nombre, resultados };

  mostrarResultado();
}

function mostrarResultado() {
  const resultadoDiv = document.getElementById("resultado");

  let html = `<h3>Jugador: ${datosGuardados.nombre}</h3><ul>`;

  datosGuardados.resultados.forEach((r, i) => {
    html += `<li>${partidos[i][0]} ${r.golA} - ${r.golB} ${partidos[i][1]}</li>`;
  });

  html += "</ul>";
  resultadoDiv.innerHTML = html;
}

function descargarPDF() {
  if (!datosGuardados) {
    alert("Primero guarda la quiniela");
    return;
  }

  const doc = new jsPDF();

  // 🎨 ENCABEZADO AZUL
  doc.setFillColor(13, 71, 161);
  doc.rect(0, 0, 210, 35, "F");

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.text("QUINIELA DE FÚTBOL CBT2", 105, 18, null, null, "center");

  doc.setFontSize(12);
  doc.text("Marcadores", 105, 26, null, null, "center");

  doc.setTextColor(0, 0, 0);

  doc.text(`Jugador: ${datosGuardados.nombre}`, 20, 50);

  let y = 65;

  datosGuardados.resultados.forEach((r, i) => {
    doc.roundedRect(15, y - 8, 180, 12, 3, 3);
    doc.text(`${partidos[i][0]} ${r.golA} - ${r.golB} ${partidos[i][1]}`, 20, y);
    y += 18;
  });

  doc.save(`quiniela_${datosGuardados.nombre}.pdf`);
}

function enviarWhatsApp() {
  if (!datosGuardados) {
    alert("Primero guarda la quiniela");
    return;
  }

  let mensaje = `Quiniela de Fútbol\nJugador: ${datosGuardados.nombre}\n\n`;

  datosGuardados.resultados.forEach((r, i) => {
    mensaje += `${partidos[i][0]} ${r.golA} - ${r.golB} ${partidos[i][1]}\n`;
  });

  const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
  window.open(url, "_blank");
}

render();
</script>

</body>
</html>
